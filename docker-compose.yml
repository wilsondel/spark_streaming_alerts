services:
  postgres:
    image: postgres:16-alpine
    container_name: ridesim-postgres
    environment:
      POSTGRES_DB: ridesim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rides-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ridesim"]
      interval: 5s
      timeout: 5s
      retries: 10

  alert-streaming:
    build: .
    container_name: alert-streaming
    environment:
      SPARK_MASTER: local[*]
      KAFKA_BROKERS: kafka:9092
      TOPIC_GEOLOCATION: topic.geolocation
      TOPIC_LIFECYCLE: topic.lifecycle
      TOPIC_ALERT: topic.alert
      CHECKPOINT_DIR: /opt/checkpoints/alerts
      RISK_THRESHOLD: "0.10"
      STARTING_OFFSETS: latest
      TRIGGER_INTERVAL: "10 seconds"
      APP_NAME: danger-zone-streaming
      JDBC_URL: jdbc:postgresql://ridesim-postgres:5432/ridesim
      JDBC_USER: postgres
      JDBC_PASSWORD: postgres
    volumes:
      - spark-checkpoints:/opt/checkpoints
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rides-net

networks:
  rides-net:
    external: true
    name: rides_simulator_default

volumes:
  spark-checkpoints:
  postgres-data:
